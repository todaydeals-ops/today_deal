<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>오늘의딜 · SNS 채널 셋업 가이드</title>
<style>
  :root{
    --o:#FF5A3C; --ink:#1A1A1A; --body:#33312D; --muted:#6F6B64; --faint:#9b968d;
    --line:#ece8e1; --paper:#FBFAF7; --card:#fff;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard','Apple SD Gothic Neo','맑은 고딕','Malgun Gothic',sans-serif;}
  body{background:var(--paper);color:var(--body);line-height:1.6;}
  a{color:var(--o);}
  .topbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);}
  .topbar .in{max-width:1080px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:10px;}
  .logo{width:30px;height:30px;border-radius:9px;background:var(--o);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .logo svg{width:18px;height:18px;}
  .brand{font-weight:800;color:var(--ink);font-size:16px;letter-spacing:-.5px;}
  .brand b{color:var(--o);}
  .tt{font-size:13px;color:var(--muted);border-left:1px solid var(--line);padding-left:10px;margin-left:2px;}
  .prog{height:4px;background:var(--line);}
  .prog > i{display:block;height:100%;background:var(--o);width:0;transition:width .25s;}

  .layout{max-width:1080px;margin:0 auto;display:flex;gap:28px;padding:24px 20px 80px;}
  /* nav */
  .nav{width:240px;flex-shrink:0;}
  .nav ol{list-style:none;position:sticky;top:80px;}
  .nav li{margin-bottom:4px;}
  .nav button{width:100%;text-align:left;border:0;background:none;cursor:pointer;padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);}
  .nav button:hover{background:#f2efe9;}
  .nav button.active{background:#fff;color:var(--ink);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .nav .num{width:24px;height:24px;border-radius:50%;background:#eceae4;color:var(--muted);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .nav button.active .num{background:var(--o);color:#fff;}
  .nav .num.done{background:#1fa463;color:#fff;}

  /* content */
  .main{flex:1;min-width:0;}
  .step{display:none;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px 34px 30px;}
  .step.show{display:block;animation:f .2s ease;}
  @keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .kicker{font-size:12px;font-weight:800;letter-spacing:1px;color:var(--o);text-transform:uppercase;}
  .step h1{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-.8px;margin:6px 0 6px;}
  .lead{color:var(--muted);font-size:15px;margin-bottom:22px;}
  .step h2{font-size:16px;font-weight:800;color:var(--ink);margin:24px 0 8px;}
  .step p{margin:8px 0;}
  .step ul{margin:8px 0 8px 2px;list-style:none;}
  .step ul li{position:relative;padding-left:20px;margin:7px 0;}
  .step ul li:before{content:"";position:absolute;left:4px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--o);}
  .tip{background:#FFF6F3;border:1px solid #ffd9cf;border-radius:12px;padding:13px 15px;font-size:13.5px;color:#8a4a38;margin:16px 0;}
  .tip b{color:var(--o);}
  .warn{background:#FBF7E9;border:1px solid #ece0b5;border-radius:12px;padding:13px 15px;font-size:13.5px;color:#7a6a2e;margin:16px 0;}
  .gobtn{display:inline-flex;align-items:center;gap:8px;background:var(--o);color:#fff;text-decoration:none;font-weight:700;font-size:14.5px;padding:12px 18px;border-radius:11px;margin:6px 8px 6px 0;box-shadow:0 2px 8px rgba(255,90,60,.25);}
  .gobtn:hover{filter:brightness(.96);}
  .gobtn .ar{font-size:13px;opacity:.85;}
  .copy{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#faf8f5;border-radius:10px;padding:9px 12px;font-size:13.5px;color:var(--body);cursor:pointer;margin:5px 8px 5px 0;font-family:'JetBrains Mono',monospace;}
  .copy:hover{border-color:var(--o);}
  .copy.ok{border-color:#1fa463;color:#1fa463;}
  .field{font-family:'JetBrains Mono',monospace;background:#f2efe9;border-radius:6px;padding:2px 7px;font-size:13px;}
  /* checkbox */
  .chk{display:flex;align-items:flex-start;gap:10px;background:#faf8f5;border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin:8px 0;cursor:pointer;}
  .chk input{margin-top:3px;width:17px;height:17px;accent-color:var(--o);flex-shrink:0;}
  .chk span{font-size:14px;color:var(--body);}
  .chk.checked span{color:var(--faint);text-decoration:line-through;}
  /* footer nav */
  .pager{display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:20px;border-top:1px solid var(--line);}
  .pager button{border:1px solid var(--line);background:#fff;border-radius:11px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;color:var(--ink);}
  .pager button:hover{border-color:var(--o);color:var(--o);}
  .pager button:disabled{opacity:.35;cursor:default;}
  .pager .next{background:var(--o);color:#fff;border-color:var(--o);}
  .pager .next:hover{filter:brightness(.96);color:#fff;}
  .deliver{background:#16140f;color:#fff;border-radius:14px;padding:18px 20px;margin:14px 0;}
  .deliver h3{color:#fff;font-size:15px;margin-bottom:10px;}
  .deliver table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .deliver td{padding:8px 6px;border-bottom:1px solid #2c2a24;vertical-align:top;}
  .deliver td:first-child{color:#ffb9a8;font-weight:700;white-space:nowrap;width:42%;}
  .done-banner{text-align:center;padding:10px;}
  .done-banner .big{font-size:40px;}
  @media(max-width:760px){
    .layout{flex-direction:column;gap:8px;padding:14px 14px 70px;}
    .nav{width:100%;}
    .nav ol{position:static;display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;}
    .nav li{margin:0;}
    .nav button{white-space:nowrap;padding:8px 10px;}
    .nav button span.lbl{display:none;}
    .nav button.active span.lbl{display:inline;}
    .step{padding:22px 18px;}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="in">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="2"/><path d="M12 7v5l3.5 2" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></span>
      <span class="brand">오늘의딜<b>.</b></span>
      <span class="tt">SNS 채널 셋업 가이드</span>
    </div>
    <div class="prog"><i id="bar"></i></div>
  </div>

  <div class="layout">
    <nav class="nav"><ol id="navlist"></ol></nav>
    <main class="main" id="main"><!-- steps injected --></main>
  </div>

<script>
const STEPS = [
  { t:"시작 · 브랜드 핸들 정하기", html:`
    <p class="lead">모든 채널(쓰레드·인스타·네이버블로그)을 <b>같은 핸들·같은 프로필</b>로 통일하는 게 브랜드 각인의 핵심입니다. 시작 전에 아래를 먼저 확정하세요.</p>
    <h2>① 핸들(아이디) 정하기 — 가능한 것으로 통일</h2>
    <ul><li><span class="field">todaydeals.kr</span> (1순위)</li><li><span class="field">todaydeals_official</span> (2순위)</li><li><span class="field">oneuldeal</span> (3순위)</li></ul>
    <h2>② 공통 프로필</h2>
    <ul>
      <li>표시 이름: <b>오늘의딜</b></li>
      <li>소개 문구: <span class="field">광고 없는 중립 쇼핑 가이드 · AI가 검증하는 진짜 싼 딜</span></li>
      <li>링크: <span class="field">https://www.todaydeals.co.kr</span></li>
      <li>프로필 이미지: 오늘의딜 로고(주황 시계)</li>
    </ul>
    <div class="tip">💡 <b>한 번 정한 핸들·프로필을 모든 채널에 그대로</b> 쓰세요. 통일감이 신뢰를 만듭니다.</div>
    <label class="chk"><input type="checkbox"><span>핸들 후보 확정</span></label>
    <label class="chk"><input type="checkbox"><span>소개 문구·프로필 이미지 준비</span></label>
  `},
  { t:"네이버 블로그 준비하기", html:`
    <p class="lead">매거진(살림 꿀팁·숨은 진실) 콘텐츠가 <b>네이버 검색에 노출</b>되는 통로입니다. 한국 유입의 핵심 채널이에요.</p>
    <a class="gobtn" href="https://nid.naver.com/user2/join.do" target="_blank" rel="noopener">네이버 회원가입 <span class="ar">↗</span></a>
    <a class="gobtn" href="https://blog.naver.com" target="_blank" rel="noopener">네이버 블로그 열기 <span class="ar">↗</span></a>
    <h2>할 일</h2>
    <ul>
      <li>네이버 아이디 생성(또는 기존 업무용 아이디 로그인)</li>
      <li>블로그 개설 → <b>블로그명·별명·소개·프로필 이미지</b>를 1단계 브랜드 값으로 통일</li>
      <li>블로그 주제: ‘쇼핑·리빙·생활정보’ 계열로 설정</li>
    </ul>
    <div class="tip">💡 사이트(todaydeals.co.kr)는 이미 <b>네이버 서치어드바이저에 등록</b>돼 있어요. 블로그는 ‘계정·정체성’만 만들어두면 됩니다.</div>
    <div class="warn">⚠️ 나중에 글 올릴 때 <b>매거진 원문을 그대로 복붙하지 마세요.</b> 중복문서로 둘 다 손해예요. (변형본은 개발팀이 따로 만들어 드립니다)</div>
    <label class="chk"><input type="checkbox"><span>네이버 아이디 준비</span></label>
    <label class="chk"><input type="checkbox"><span>블로그 개설 + 프로필 브랜드 통일</span></label>
  `},
  { t:"인스타그램 계정 만들기", html:`
    <p class="lead">쓰레드를 인스타 계정으로 만들면 <b>인스타·쓰레드 두 채널을 한 번에</b> 확보합니다. 그래서 인스타를 먼저 만듭니다.</p>
    <a class="gobtn" href="https://www.instagram.com/accounts/emailsignup/" target="_blank" rel="noopener">인스타그램 가입 <span class="ar">↗</span></a>
    <h2>할 일</h2>
    <ul>
      <li>1단계 핸들로 가입</li>
      <li>설정 → 계정 → <b>프로페셔널(비즈니스) 계정으로 전환</b></li>
      <li>이름·소개·링크·프로필 이미지 = 브랜드 값으로</li>
    </ul>
    <label class="chk"><input type="checkbox"><span>인스타 계정 생성</span></label>
    <label class="chk"><input type="checkbox"><span>비즈니스 전환 + 프로필 세팅</span></label>
  `},
  { t:"쓰레드 계정 만들기", html:`
    <p class="lead">핫딜 AI강추를 <b>자동 발행</b>할 채널입니다.</p>
    <a class="gobtn" href="https://www.threads.net" target="_blank" rel="noopener">쓰레드 열기 <span class="ar">↗</span></a>
    <h2>할 일</h2>
    <ul>
      <li><b>인스타 계정으로 로그인</b>(앞 단계에서 만든 계정)</li>
      <li>프로필을 브랜드 값으로 동일하게 정리</li>
    </ul>
    <label class="chk"><input type="checkbox"><span>쓰레드 계정 생성(인스타 연동)</span></label>
    <label class="chk"><input type="checkbox"><span>프로필 정리</span></label>
  `},
  { t:"메타 개발자 등록 & 앱 만들기", html:`
    <p class="lead">자동 발행을 위해 메타(페이스북) 개발자 앱이 필요합니다. <b>무료</b>예요.</p>
    <a class="gobtn" href="https://developers.facebook.com" target="_blank" rel="noopener">메타 개발자 센터 <span class="ar">↗</span></a>
    <h2>할 일</h2>
    <ul>
      <li>우상단 <b>시작하기(Get Started)</b> → 개발자 등록(휴대폰 인증 등 안내대로)</li>
      <li>상단 <b>내 앱(My Apps)</b> → <b>앱 만들기(Create App)</b></li>
      <li>앱 이름: <span class="field">오늘의딜 Threads</span> (내부용)</li>
      <li>유스케이스에서 <b>“Threads API / Access the Threads API”</b> 선택 <span style="color:var(--muted)">(없으면 앱 생성 후 제품추가 → Threads)</span></li>
    </ul>
    <label class="chk"><input type="checkbox"><span>메타 개발자 등록</span></label>
    <label class="chk"><input type="checkbox"><span>앱 생성 + Threads 유스케이스 추가</span></label>
  `},
  { t:"권한 · 콜백 URL 설정", html:`
    <p class="lead">앱이 ‘게시’ 권한을 갖게 하고, 토큰을 받을 콜백 주소를 등록합니다.</p>
    <h2>① 권한(스코프) 추가</h2>
    <p>앱 대시보드 → <b>Use cases → Customize(맞춤설정)</b>에서:</p>
    <ul><li><span class="field">threads_basic</span> (필수)</li><li><span class="field">threads_content_publish</span> (필수 · 게시)</li></ul>
    <h2>② 콜백 URL 등록</h2>
    <p>Threads 설정 → <b>Redirect Callback URLs</b>에 아래 둘 다 입력(복사해서 붙여넣기):</p>
    <button class="copy" data-c="https://localhost/auth/threads/callback">📋 https://localhost/auth/threads/callback</button>
    <button class="copy" data-c="https://www.todaydeals.co.kr/auth/threads/callback">📋 https://www.todaydeals.co.kr/auth/threads/callback</button>
    <label class="chk"><input type="checkbox"><span>권한 2개 추가</span></label>
    <label class="chk"><input type="checkbox"><span>콜백 URL 2개 등록</span></label>
  `},
  { t:"액세스 토큰 발급", html:`
    <p class="lead">앱이 쓰레드 계정 대신 글을 올릴 수 있게 ‘토큰’을 발급합니다.</p>
    <h2>할 일</h2>
    <ul>
      <li>앱 대시보드 → <b>Threads → Generate Token(토큰 생성)</b></li>
      <li>우리 <b>쓰레드 계정으로 권한 승인(Authorize)</b></li>
      <li>처음엔 단기 토큰(1시간) → 가능하면 <b>장기 토큰(60일)</b>까지 교환</li>
    </ul>
    <div class="tip">💡 장기 토큰 교환·자동 갱신은 개발팀이 코드로 처리합니다. <b>단기 토큰까지만 받아도 OK</b>예요.</div>
    <label class="chk"><input type="checkbox"><span>쓰레드 계정 권한 승인</span></label>
    <label class="chk"><input type="checkbox"><span>토큰 발급(단기 또는 장기)</span></label>
  `},
  { t:"완료 · 전달할 값 정리", html:`
    <div class="done-banner"><div class="big">🎉</div><p class="lead" style="margin-top:6px">거의 다 왔습니다! 아래 <b>4가지 값</b>을 정리해 전달하면 끝이에요.</p></div>
    <div class="deliver">
      <h3>📦 개발팀(또는 사장님)에게 전달할 값</h3>
      <table>
        <tr><td>App ID (Client ID)</td><td>앱 대시보드 → 설정 → 기본</td></tr>
        <tr><td>App Secret</td><td>앱 대시보드 → 설정 → 기본 (‘표시’ 클릭)</td></tr>
        <tr><td>Threads 액세스 토큰</td><td>7단계에서 발급한 값</td></tr>
        <tr><td>Threads 사용자 ID</td><td>토큰 발급 화면(또는 개발팀이 토큰으로 조회)</td></tr>
      </table>
    </div>
    <div class="warn">⚠️ 위 값들은 <b>비밀번호급 민감정보</b>입니다. 메신저 평문 대신 <b>안전한 경로</b>(암호 메모/직접 전달)로 넘겨주세요.</div>
    <p>추가로 알려줄 것: 쓰레드 <b>계정 핸들(@…)</b>, 등록한 콜백 URL.</p>
    <label class="chk"><input type="checkbox"><span>4가지 값 수집 완료</span></label>
    <label class="chk"><input type="checkbox"><span>안전한 경로로 전달 완료</span></label>
  `},
];

const main = document.getElementById('main');
const navlist = document.getElementById('navlist');
const bar = document.getElementById('bar');
let cur = 0;
const KEY = 'sns-setup-progress';
const saved = JSON.parse(localStorage.getItem(KEY) || '{}');

STEPS.forEach((s,i)=>{
  const sec = document.createElement('section');
  sec.className = 'step'; sec.dataset.i = i;
  sec.innerHTML = `<div class="kicker">STEP ${i+1} / ${STEPS.length}</div><h1>${s.t}</h1>${s.html}
    <div class="pager">
      <button class="prev" ${i===0?'disabled':''}>← 이전</button>
      <button class="next">${i===STEPS.length-1?'완료':'다음 →'}</button>
    </div>`;
  main.appendChild(sec);

  const li = document.createElement('li');
  li.innerHTML = `<button data-i="${i}"><span class="num">${i+1}</span><span class="lbl">${s.t}</span></button>`;
  navlist.appendChild(li);
});

const sections = [...document.querySelectorAll('.step')];
const navbtns = [...document.querySelectorAll('.nav button')];

function stepDone(i){
  const boxes = sections[i].querySelectorAll('input[type=checkbox]');
  return boxes.length>0 && [...boxes].every(b=>b.checked);
}
function render(){
  sections.forEach((s,i)=>s.classList.toggle('show', i===cur));
  navbtns.forEach((b,i)=>b.classList.toggle('active', i===cur));
  navbtns.forEach((b,i)=>{
    const num=b.querySelector('.num');
    num.classList.toggle('done', stepDone(i));
    num.textContent = stepDone(i) ? '✓' : (i+1);
  });
  bar.style.width = ((cur+1)/STEPS.length*100)+'%';
  window.scrollTo({top:0,behavior:'smooth'});
}
function go(i){ cur=Math.max(0,Math.min(STEPS.length-1,i)); localStorage.setItem(KEY, JSON.stringify({cur})); render(); }

// restore checkboxes
sections.forEach((s,i)=>{
  s.querySelectorAll('input[type=checkbox]').forEach((b,j)=>{
    const id = `s${i}_${j}`;
    b.checked = !!saved[id];
    if(b.checked) b.closest('.chk').classList.add('checked');
    b.addEventListener('change',()=>{
      saved[id]=b.checked; localStorage.setItem(KEY, JSON.stringify(saved));
      b.closest('.chk').classList.toggle('checked', b.checked);
      render();
    });
  });
});
main.addEventListener('click',e=>{
  if(e.target.closest('.prev')) go(cur-1);
  if(e.target.closest('.next')) go(cur+1);
  const c = e.target.closest('.copy');
  if(c){ navigator.clipboard.writeText(c.dataset.c); c.classList.add('ok'); const t=c.textContent; c.textContent='✓ 복사됨'; setTimeout(()=>{c.textContent=t;c.classList.remove('ok');},1200); }
});
navlist.addEventListener('click',e=>{ const b=e.target.closest('button[data-i]'); if(b) go(+b.dataset.i); });

cur = saved.cur || 0;
render();
</script>
</body>
</html>
