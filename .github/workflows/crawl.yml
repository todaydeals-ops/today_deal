name: 타임딜 자동수집

# 매일 11:05 KST(02:05 UTC) 예약 — 지마켓(10시)·11번가 타임딜(11시) 초기화 직후 함께 수집.
# (GitHub 스케줄러는 분 단위·best-effort라 보통 몇 분 지연 → 갱신 직후 안전.)
# (+ Actions 탭에서 수동 실행 버튼)
on:
  schedule:
    - cron: "5 2 * * *"
  workflow_dispatch: {}

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 의존성 설치
        working-directory: crawler
        run: npm install

      - name: 크롬 설치
        working-directory: crawler
        run: npx playwright install --with-deps chromium

      - name: 슈퍼딜 자동수집 → 등록
        working-directory: crawler
        env:
          INGEST_URL: https://www.todaydeals.co.kr/api/deals/ingest
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: node collect-headless.mjs
