name: 타임딜 자동수집

# 2시간마다 실행 — 타임딜이 3시간짜리 회전 슬롯이라 자주 갱신해야 신선함 유지.
# (PC가 꺼져 있을 때 백업. GitHub 스케줄러는 best-effort라 수십 분 지연 가능)
# (+ Actions 탭에서 수동 실행 버튼)
on:
  schedule:
    - cron: "5 */2 * * *"
  workflow_dispatch: {}

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 의존성 설치
        working-directory: crawler
        run: npm install

      - name: 크롬 설치
        working-directory: crawler
        run: npx playwright install --with-deps chromium

      - name: 슈퍼딜 자동수집 → 등록
        working-directory: crawler
        env:
          INGEST_URL: https://www.todaydeals.co.kr/api/deals/ingest
          # 시크릿 통일 — board-ingest 워크플로와 동일하게 CRON_SECRET 하나만 관리.
          INGEST_SECRET: ${{ secrets.CRON_SECRET }}
        run: node collect-headless.mjs
